apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "my-backend.fullname" . }}-test-connection"
  labels:
    {{- include "my-backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['my-backend-service:80']
  restartPolicy: Never
